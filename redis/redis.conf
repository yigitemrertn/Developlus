# ─────────────────────────────────────────
#  Developlus — Redis Configuration
# ─────────────────────────────────────────

# Ağ
bind 0.0.0.0
port 6379
protected-mode no

# Bellek
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence — AOF (Append Only File)
# Celery task'larının kaybolmaması için kritik
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshot (ek güvence)
save 900 1
save 300 10
save 60 10000

# Bağlantı
maxclients 1000
timeout 300
tcp-keepalive 300

# Log
loglevel notice
logfile ""

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
